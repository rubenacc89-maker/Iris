<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0e11;
    color: #fff;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
    user-select: none;
    -webkit-app-region: drag;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .logo svg { opacity: 0.9; }

  .logo-name {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #fff;
  }

  .status {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.02em;
    min-height: 1.2em;
    text-align: center;
  }

  .progress-wrap {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    height: 5px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 100px;
    transition: width 0.3s ease;
  }

  .percent {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 90 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="45" cy="24" rx="38" ry="20" stroke="white" stroke-width="4"/>
      <circle cx="45" cy="24" r="7" fill="white"/>
    </svg>
    <span class="logo-name">IRIS</span>
  </div>

  <div style="width:100%">
    <div class="progress-wrap">
      <div class="progress-bar" id="bar"></div>
    </div>
  </div>

  <div style="display:flex; align-items:center; justify-content:space-between; width:100%">
    <span class="status" id="status">Descargando actualización...</span>
    <span class="percent" id="percent">0%</span>
  </div>

  <script>
    const { ipcRenderer } = require('electron')

    ipcRenderer.on('update-progress', (_, data) => {
      const pct = Math.round(data.percent || 0)
      document.getElementById('bar').style.width = pct + '%'
      document.getElementById('percent').textContent = pct + '%'
    })

    ipcRenderer.on('update-installing', () => {
      document.getElementById('status').textContent = 'Instalando...'
      document.getElementById('bar').style.width = '100%'
      document.getElementById('percent').textContent = '100%'
    })
  </script>
</body>
</html>
