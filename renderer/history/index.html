<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'none'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          rgba(6,  6,  6,  0.88);
      --bg2:         rgba(4,  4,  4,  0.92);
      --bg3:         rgba(14, 14, 14, 0.80);
      --border:      rgba(40, 40, 40, 0.95);
      --accent:      #ffffff;
      --accent2:     #aaaaaa;
      --text:        #e8e8e8;
      --text2:       #666666;
      --text3:       #333333;
      --user-bubble: rgba(20, 20, 20, 0.90);
      --ai-bubble:   rgba(10, 10, 10, 0.85);
      --green:       #4ade80;
      --yellow:      #fbbf24;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      border: 1px solid rgba(40, 40, 40, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Header */
    #header {
      background: rgba(8, 8, 20, 0.6);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .header-icon {
      width: 14px;
      height: 14px;
      opacity: 0.55;
      flex-shrink: 0;
      fill: #fff;
    }

    #header h1 {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hdr-sep {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.10);
      margin: 0 2px;
      flex-shrink: 0;
    }

    /* Avatar en header */
    #hdr-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--text2);
    }

    #hdr-avatar img { width: 100%; height: 100%; object-fit: cover; }

    #hdr-username {
      font-size: 12px;
      color: var(--text2);
      max-width: 110px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 4px;
      -webkit-app-region: no-drag;
    }

    .hdr-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    .hdr-btn:hover { color: var(--text); background: var(--bg3); }
    .hdr-btn.danger:hover { color: #f38ba8; background: transparent; }
    .hdr-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* Tabs */
    #tabs {
      display: flex;
      background: rgba(8, 8, 20, 0.45);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: var(--accent2);
      border-bottom-color: var(--accent);
    }

    .tab:hover:not(.active) {
      color: var(--text2);
    }

    /* Memory info bar */
    #memory-bar {
      background: rgba(20, 20, 40, 0.5);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    .mem-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text2);
    }

    .mem-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text3);
      text-align: center;
      padding: 4px 0;
    }

    .bubble {
      padding: 10px 13px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 13px;
      max-width: 88%;
    }

    .bubble-q {
      background: rgba(22, 22, 22, 0.95);
      color: var(--text);
      align-self: flex-end;
      border-radius: 8px 8px 2px 8px;
      border: 1px solid #222;
    }

    .bubble-a {
      background: rgba(10, 10, 10, 0.90);
      color: var(--text);
      align-self: flex-start;
      border-radius: 2px 8px 8px 8px;
      border: 1px solid #1e1e1e;
      border-left: 2px solid #444;
    }

    .bubble-label {
      font-size: 10px;
      color: var(--text3);
      margin-bottom: 2px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .bubble-label.ai {
      color: var(--accent);
      opacity: 0.8;
    }

    .bubble-a ul {
      margin: 6px 0 2px 0;
      padding-left: 18px;
      list-style: disc;
    }

    .bubble-a li {
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .bubble-a strong { color: var(--accent); font-weight: 600; }
    .bubble-a em { color: var(--yellow); font-style: italic; }

    /* Juegos tab */
    #chats-content {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #chats-content.active { display: flex; }

    /* Lista de juegos */
    #games-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #games-list::-webkit-scrollbar { width: 4px; }
    #games-list::-webkit-scrollbar-track { background: transparent; }
    #games-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .game-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .game-card:hover { border-color: rgba(255,255,255,0.14); background: rgba(20,20,20,0.9); }

    .game-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .game-card-info { flex: 1; min-width: 0; }

    .game-card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .game-card-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .game-card-arrow {
      color: var(--text3);
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* Vista sesiones de un juego */
    #sessions-view {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #sessions-view.visible { display: flex; }

    #sessions-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sessions-back {
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 2px 6px 2px 2px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 18px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    #sessions-back:hover { color: var(--text); }

    #sessions-game-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    #sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #sessions-list::-webkit-scrollbar { width: 4px; }
    #sessions-list::-webkit-scrollbar-track { background: transparent; }
    #sessions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .session-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 13px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .session-item:hover { border-color: rgba(255,255,255,0.14); background: rgba(20,20,20,0.9); }
    .session-item.active-session { border-color: rgba(255,255,255,0.22); }

    .session-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .session-item-date {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .session-item-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .session-item:hover .session-item-actions { opacity: 1; }

    .session-action-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 3px 4px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .session-action-btn:hover { color: var(--text); }
    .session-action-btn.del:hover { color: #f38ba8; }
    .session-action-btn svg { width: 12px; height: 12px; fill: currentColor; }

    .session-item-time {
      font-size: 10px;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .session-item-preview {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-item-count {
      font-size: 10px;
      color: var(--text3);
    }

    .chat-item-title-input {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: inherit;
      outline: none;
      flex: 1;
      min-width: 0;
    }

    .chats-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 12px;
      gap: 6px;
    }

    .mem-clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 11px;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .mem-clear-btn:hover { color: #f38ba8; border-color: #f38ba8; }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text3);
      font-size: 12px;
    }

    .empty svg {
      width: 32px;
      height: 32px;
      fill: var(--text3);
      opacity: 0.4;
    }

    /* Footer */
    #footer {
      background: rgba(8, 8, 20, 0.65);
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    #footer-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 7px 14px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    #footer-input:focus { border-color: var(--accent); }
    #footer-input::placeholder { color: var(--text3); }


    #footer-send {
      background: rgba(255,255,255,0.08);
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      color: #ccc;
    }

    #footer-send:hover { background: rgba(255,255,255,0.14); }
    #footer-send svg { width: 13px; height: 13px; fill: currentColor; }

    #settings-content {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }
    #settings-content.active { display: flex; }

    #feedback-content {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 16px;
      gap: 12px;
    }
    #feedback-content.active { display: flex; }

    #feedback-textarea {
      flex: 1;
      min-height: 120px;
      max-height: 220px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.15s;
    }
    #feedback-textarea:focus { border-color: rgba(56,189,248,0.4); }
    #feedback-textarea::placeholder { color: var(--text3); }

    .setting-block {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .setting-block h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .shortcut-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #shortcut-display {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      color: #a09fff;
      font-size: 13px;
      font-family: monospace;
      text-align: center;
    }
    #shortcut-display.recording {
      border-color: #34d399;
      color: #34d399;
      animation: shortcut-blink 0.8s ease infinite;
    }
    @keyframes shortcut-blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes snack-in { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
    .btn-sm {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-sm:hover { background: rgba(255,255,255,0.14); }
    .btn-sm.primary { background: rgba(99,102,241,0.3); border-color: rgba(99,102,241,0.5); }
    .btn-sm.primary:hover { background: rgba(99,102,241,0.5); }


    #footer-mic {
      background: transparent;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      color: rgba(255,255,255,0.4);
    }
    #footer-mic:hover { color: rgba(255,255,255,0.8); }
    #footer-mic svg { width: 14px; height: 14px; fill: currentColor; }
    #footer-mic.recording { color: #ef4444; animation: mic-pulse 1s ease infinite; }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50%       { box-shadow: 0 0 0 5px rgba(239,68,68,0); }
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="header-left">
        <svg class="header-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
        <h1>Iris</h1>
        <div class="hdr-sep"></div>
        <div id="hdr-avatar"></div>
        <span id="hdr-username"></span>
        <button class="hdr-btn danger" onclick="logout()" title="Cerrar sesión">
          <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zm-5 12H5V5h7V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h7v-2z"/></svg>
        </button>
      </div>
      <div id="header-right">
        <button class="hdr-btn" onclick="clearHistory()" title="Limpiar historial">
          <svg viewBox="0 0 24 24"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14zM6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12z"/></svg>
        </button>
        <button class="hdr-btn" onclick="window.api.send('close-history')" title="Cerrar">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>

    <div id="tabs">
      <div class="tab active" onclick="switchTab('chat')">Conversación</div>
      <div class="tab" onclick="switchTab('memory')">Juegos</div>
      <div class="tab" onclick="switchTab('settings')">⚙ Config</div>
      <div class="tab" onclick="switchTab('feedback')">Ayuda & Bugs</div>
    </div>

    <div id="memory-bar">
      <div class="mem-chip">
        <div class="mem-dot"></div>
        <span id="game-label">Juego: —</span>
      </div>
      <div class="mem-chip">
        <div class="mem-dot" style="background: #89b4fa"></div>
        <span id="session-label">Sesión activa</span>
      </div>
    </div>

    <div id="messages"></div>
    <div id="chats-content">
      <div id="games-list"></div>
      <div id="sessions-view">
        <div id="sessions-header">
          <button id="sessions-back" onclick="showGamesList()">‹</button>
          <span id="sessions-game-title"></span>
        </div>
        <div id="sessions-list"></div>
      </div>
    </div>
    <div id="settings-content"></div>
    <div id="feedback-content"></div>

    <!-- Snackbar reutilizable -->
    <div id="snackbar" style="display:none;margin:0 10px 8px;border-radius:8px;background:rgba(15,20,30,0.97);border:1px solid rgba(56,189,248,0.2);box-shadow:0 4px 20px rgba(0,0,0,0.5);padding:12px 14px;animation:snack-in 0.2s ease">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.3);display:flex;align-items:center;justify-content:center">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div style="flex:1;min-width:0">
          <div id="snackbar-title" style="font-size:12px;font-weight:600;color:#e2f3ff;margin-bottom:3px"></div>
          <div id="snackbar-body" style="font-size:11px;color:#94a3b8;line-height:1.5"></div>
        </div>
        <button onclick="snackbarClose()" style="flex-shrink:0;background:none;border:none;color:#475569;cursor:pointer;padding:0;font-size:14px;line-height:1;margin-top:-1px">✕</button>
      </div>
      <div id="snackbar-cta-row" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(56,189,248,0.1)">
        <button id="snackbar-cta" style="background:none;border:none;color:#38bdf8;font-size:11px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px"></button>
      </div>
    </div>

    <div id="footer">
      <input id="footer-input" type="text" placeholder="Escribe aquí..." maxlength="500" />
      <button id="footer-mic" title="Hablar">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 16.93A7.001 7.001 0 0 1 5 11H3a9 9 0 0 0 8 8.94V22h2v-2.06A9 9 0 0 0 21 11h-2a7 7 0 0 1-6 6.93z"/></svg>
      </button>
      <button id="footer-send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <script>
    let currentTab = 'chat'

    function switchTab(tab) {
      currentTab = tab
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active',
          (i === 0 && tab === 'chat') ||
          (i === 1 && tab === 'memory') ||
          (i === 2 && tab === 'settings') ||
          (i === 3 && tab === 'feedback'))
      })
      document.getElementById('messages').style.display        = tab === 'chat' ? 'flex' : 'none'
      document.getElementById('chats-content').classList.toggle('active', tab === 'memory')
      document.getElementById('settings-content').classList.toggle('active', tab === 'settings')
      document.getElementById('feedback-content').classList.toggle('active', tab === 'feedback')
      document.getElementById('footer').style.display = tab === 'chat' ? 'flex' : 'none'
      if (tab === 'memory')   loadChats()
      if (tab === 'settings') loadSettings()
      if (tab === 'feedback') loadFeedback()
    }

    function formatTime(ts) {
      const d = new Date(ts)
      return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }) +
        ' ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
    }

    function formatDate(ts) {
      if (!ts) return ''
      const d = new Date(ts), now = new Date()
      const isToday = d.toDateString() === now.toDateString()
      if (isToday) return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
      return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' })
    }

    // ─── Chat conversación activa ─────────────────────────────────────────────

    async function loadHistory() {
      const history = await window.api.invoke('get-history')
      const container = document.getElementById('messages')

      if (!history || history.length === 0) {
        const session = await window.api.invoke('get-session')
        const firstName = session?.name ? session.name.split(' ')[0] : null
        const greeting = firstName ? `Hola ${firstName}!` : 'Hola!'
        container.innerHTML = `
          <div class="msg-group" id="welcome-msg">
            <div class="bubble-label ai">Iris</div>
            <div class="bubble bubble-a">${greeting} ¿Qué juego tenemos hoy?</div>
          </div>`
        return
      }

      container.innerHTML = ''
      history.forEach(item => {
        const group = document.createElement('div')
        group.className = 'msg-group'
        group.innerHTML = `
          <div class="msg-time">${formatTime(item.timestamp)}</div>
          <div class="bubble-label" style="text-align:right">Tú</div>
          <div class="bubble bubble-q">${escHtml(item.question)}</div>
          <div class="bubble-label ai">Iris</div>
          <div class="bubble bubble-a">${renderMarkdown(item.answer)}</div>
        `
        container.appendChild(group)
      })
      container.scrollTop = container.scrollHeight
    }

    async function loadHeaderProfile() {
      const session = await window.api.invoke('get-session')
      if (!session) return
      const avatarEl = document.getElementById('hdr-avatar')
      if (session.photoURL) {
        avatarEl.innerHTML = `<img src="${session.photoURL}" alt="" referrerpolicy="no-referrer">`
      } else {
        avatarEl.textContent = (session.name || session.email || '?')
          .split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase()
      }
      const firstName = (session.name || session.email || '').split(' ')[0]
      document.getElementById('hdr-username').textContent = firstName
    }

    // ─── Tab Juegos ───────────────────────────────────────────────────────────

    let _allChats    = []
    let _activeChat  = null
    let _selectedGame = null

    function formatSessionDate(ts) {
      if (!ts) return ''
      const d   = new Date(ts)
      const now = new Date()
      const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1)
      if (d.toDateString() === now.toDateString()) return 'Hoy'
      if (d.toDateString() === yesterday.toDateString()) return 'Ayer'
      return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' })
    }

    function formatSessionTime(ts) {
      if (!ts) return ''
      return new Date(ts).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
    }

    async function loadChats() {
      _allChats   = await window.api.invoke('get-chats') || []
      _activeChat = await window.api.invoke('get-active-chat')
      showGamesList()
    }

    function showGamesList() {
      _selectedGame = null
      document.getElementById('games-list').style.display = 'flex'
      document.getElementById('sessions-view').classList.remove('visible')
      renderGamesList()
    }

    function renderGamesList() {
      const list = document.getElementById('games-list')

      if (!_allChats.length) {
        list.innerHTML = `<div class="chats-empty"><span>Sin sesiones anteriores</span><span style="font-size:10px">Las partidas aparecerán aquí</span></div>`
        return
      }

      // Agrupar por juego
      const gameMap = {}
      for (const chat of _allChats) {
        const game = chat.game || 'Sin juego'
        if (!gameMap[game]) gameMap[game] = []
        gameMap[game].push(chat)
      }

      // Ordenar por sesión más reciente
      const sorted = Object.entries(gameMap).sort((a, b) => {
        const latestA = Math.max(...a[1].map(c => c.updatedAt || c.createdAt || 0))
        const latestB = Math.max(...b[1].map(c => c.updatedAt || c.createdAt || 0))
        return latestB - latestA
      })

      list.innerHTML = ''
      const today = new Date().toDateString()

      for (const [game, sessions] of sorted) {
        const latest  = sessions.reduce((a, b) => ((b.updatedAt || 0) > (a.updatedAt || 0) ? b : a))
        const latestTs = latest.updatedAt || latest.createdAt
        const isToday  = new Date(latestTs).toDateString() === today
        const count    = sessions.length

        const card = document.createElement('div')
        card.className = 'game-card'
        card.innerHTML = `
          <div class="game-dot" style="background:${isToday ? '#4ade80' : '#333'}"></div>
          <div class="game-card-info">
            <div class="game-card-name">${escHtml(game)}</div>
            <div class="game-card-sub">${count} ${count === 1 ? 'sesión' : 'sesiones'} &middot; última ${formatSessionDate(latestTs).toLowerCase()} ${formatSessionTime(latestTs)}</div>
          </div>
          <span class="game-card-arrow">›</span>
        `
        card.addEventListener('click', () => openGameSessions(game, sessions))
        list.appendChild(card)
      }
    }

    function openGameSessions(gameName, sessions) {
      _selectedGame = gameName
      document.getElementById('games-list').style.display = 'none'
      document.getElementById('sessions-view').classList.add('visible')
      document.getElementById('sessions-game-title').textContent = gameName

      const list = document.getElementById('sessions-list')
      const sorted = [...sessions].sort((a, b) =>
        (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0)
      )

      list.innerHTML = ''
      for (const session of sorted) {
        const ts       = session.updatedAt || session.createdAt
        const isActive = _activeChat && session.id === _activeChat.id
        const count    = session.messageCount || 0
        const preview  = session.preview ? escHtml(session.preview.slice(0, 58) + (session.preview.length > 58 ? '…' : '')) : ''

        const item = document.createElement('div')
        item.className = 'session-item' + (isActive ? ' active-session' : '')
        item.dataset.chatId = session.id
        item.innerHTML = `
          <div class="session-item-top">
            <span class="session-item-date">${formatSessionDate(ts)}</span>
            <div class="session-item-actions">
              <button class="session-action-btn" title="Renombrar" onclick="startRenameSession(event,'${session.id}')">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.46a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
              </button>
              <button class="session-action-btn del" title="Eliminar" onclick="deleteSession(event,'${session.id}')">
                <svg viewBox="0 0 24 24"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14zM6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12z"/></svg>
              </button>
            </div>
            <span class="session-item-time">${formatSessionTime(ts)}</span>
          </div>
          ${preview ? `<div class="session-item-preview">${preview}</div>` : ''}
          <div class="session-item-count">${count} ${count === 1 ? 'mensaje' : 'mensajes'}${isActive ? ' · activa' : ''}</div>
        `
        item.addEventListener('click', e => {
          if (e.target.closest('.session-action-btn')) return
          openSessionDetail(session)
        })
        list.appendChild(item)
      }
    }

    async function openSessionDetail(chat) {
      const ok = await window.api.invoke('switch-chat', chat.id)
      if (!ok) return
      _activeChat = { id: chat.id }
      if (chat.game) document.getElementById('game-label').textContent = `Juego: ${chat.game}`
      switchTab('chat')
      await loadHistory()
    }

    function startRenameSession(e, chatId) {
      e.stopPropagation()
      const item = document.querySelector(`.session-item[data-chat-id="${chatId}"]`)
      if (!item) return
      const dateEl = item.querySelector('.session-item-date')
      const current = dateEl.textContent
      dateEl.outerHTML = `<input class="chat-item-title-input" style="font-size:12px" value="${escHtml(current)}" data-rename-id="${chatId}">`
      const input = item.querySelector('.chat-item-title-input')
      input.focus(); input.select()
      input.addEventListener('keydown', async e2 => {
        if (e2.key === 'Enter') await commitRenameSession(input)
        if (e2.key === 'Escape') refreshSessions()
      })
      input.addEventListener('blur', () => commitRenameSession(input))
    }

    async function commitRenameSession(input) {
      const chatId   = input.dataset.renameId
      const newTitle = input.value.trim()
      if (newTitle) await window.api.invoke('rename-chat', { chatId, newTitle })
      refreshSessions()
    }

    async function deleteSession(e, chatId) {
      e.stopPropagation()
      await window.api.invoke('delete-chat', { chatId })
      _allChats = await window.api.invoke('get-chats') || []
      if (_selectedGame) {
        const remaining = _allChats.filter(c => (c.game || 'Sin juego') === _selectedGame)
        if (remaining.length) openGameSessions(_selectedGame, remaining)
        else showGamesList()
      } else {
        showGamesList()
      }
    }

    function refreshSessions() {
      if (_selectedGame) {
        const sessions = _allChats.filter(c => (c.game || 'Sin juego') === _selectedGame)
        openGameSessions(_selectedGame, sessions)
      }
    }

    // ─── Enviar mensaje ───────────────────────────────────────────────────────

    function logout() {
      window.api.send('logout')
    }

    async function sendFromHistory() {
      const input = document.getElementById('footer-input')
      const text = input.value.trim()
      if (!text) return

      input.value = ''
      input.disabled = true

      const container = document.getElementById('messages')
      const group = document.createElement('div')
      group.className = 'msg-group'
      group.innerHTML = `
        <div class="msg-time">${formatTime(Date.now())}</div>
        <div class="bubble-label" style="text-align:right">Tú</div>
        <div class="bubble bubble-q">${escHtml(text)}</div>
        <div class="bubble-label ai">Iris</div>
        <div class="bubble bubble-a"><span class="spinner"></span>Pensando...</div>
      `
      container.appendChild(group)
      container.scrollTop = container.scrollHeight

      try {
        const result = await window.api.invoke('send-message', { message: text })
        const response = result?.response ?? result
        group.querySelector('.bubble-a').innerHTML = renderMarkdown(response)
        if (result?.currentGame) {
          document.getElementById('game-label').textContent = `Juego: ${result.currentGame}`
          await checkGameTip(result.currentGame)
        }
      } catch (e) {
        group.querySelector('.bubble-a').textContent = 'Error al conectar. Intenta de nuevo.'
      }

      input.disabled = false
      input.focus()
      container.scrollTop = container.scrollHeight
    }

    async function clearHistory() {
      await window.api.invoke('clear-history')
      loadHistory()
    }

    // ─── Utils ────────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>')
    }

    function renderMarkdown(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>')
        .replace(/_([^_\n]+?)_/g, '<em>$1</em>')
        .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>(\n|<br>)*)+/gs, m => '<ul>' + m + '</ul>')
        .replace(/\n/g, '<br>')
    }

    document.getElementById('footer-send').addEventListener('click', sendFromHistory)
    document.getElementById('footer-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendFromHistory()
    })

    // ─── BOTÓN MICRÓFONO ─────────────────────────────────────────────────────
    const micBtn = document.getElementById('footer-mic')
    let micRecorder  = null
    let micChunks    = []
    let micRecording = false
    let micTimer     = null
    let micSilence   = null

    micBtn.addEventListener('click', async () => {
      if (micRecording) { stopMic(); return }
      await startMic()
    })

    async function startMic() {
      let stream
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      } catch (e) {
        appendMicError('Sin acceso al micrófono: ' + e.message)
        return
      }

      micChunks = []; micRecording = true
      micBtn.classList.add('recording')
      micBtn.title = 'Click para parar'

      const ctx      = new AudioContext()
      const src      = ctx.createMediaStreamSource(stream)
      const analyser = ctx.createAnalyser()
      analyser.fftSize = 256
      src.connect(analyser)
      const data       = new Uint8Array(analyser.frequencyBinCount)
      let silStart     = null
      let hasSpoken    = false

      micRecorder = new MediaRecorder(stream)
      micRecorder.ondataavailable = (e) => { if (e.data.size > 0) micChunks.push(e.data) }
      micRecorder.onstop = async () => {
        clearInterval(micSilence); clearTimeout(micTimer)
        stream.getTracks().forEach(t => t.stop()); ctx.close()
        micRecording = false; micBtn.classList.remove('recording'); micBtn.title = 'Hablar'
        await sendMicAudio()
      }
      micRecorder.start(250)

      micTimer = setTimeout(() => stopMic(), 30000)

      micSilence = setInterval(() => {
        analyser.getByteFrequencyData(data)
        const vol = data.reduce((a, b) => a + b, 0) / data.length
        if (vol > 10) { hasSpoken = true; silStart = null }
        else if (hasSpoken) {
          if (!silStart) silStart = Date.now()
          else if (Date.now() - silStart > 1500) stopMic()
        }
      }, 80)
    }

    function stopMic() {
      if (micRecorder?.state === 'recording') micRecorder.stop()
    }

    async function sendMicAudio() {
      if (!micChunks.length) return
      const container = document.getElementById('messages')

      const group = document.createElement('div')
      group.className = 'msg-group'
      group.innerHTML = `
        <div class="msg-time">${formatTime(Date.now())}</div>
        <div class="bubble-label" style="text-align:right">Tú 🎤</div>
        <div class="bubble bubble-q" id="mic-q-bubble">...</div>
        <div class="bubble-label ai">Iris</div>
        <div class="bubble bubble-a"><span class="spinner"></span>Transcribiendo...</div>
      `
      container.appendChild(group)
      container.scrollTop = container.scrollHeight

      const blob   = new Blob(micChunks, { type: 'audio/webm' })
      const buffer = await blob.arrayBuffer()
      const uint8  = new Uint8Array(buffer)
      let binary   = ''
      for (let i = 0; i < uint8.length; i += 8192)
        binary += String.fromCharCode(...uint8.subarray(i, Math.min(i + 8192, uint8.length)))
      const audioBase64 = btoa(binary)

      try {
        const result = await window.api.invoke('voice-command', { audioBase64 })
        if (result?.error) {
          group.querySelector('.bubble-a').textContent = 'Error: ' + result.error
          group.querySelector('#mic-q-bubble').textContent = '(sin transcripción)'
        } else {
          group.querySelector('#mic-q-bubble').textContent = result.transcription || '(sin texto)'
          group.querySelector('.bubble-a').innerHTML = renderMarkdown(result.response)
          if (result.currentGame) {
            document.getElementById('game-label').textContent = `Juego: ${result.currentGame}`
            checkGameTip(result.currentGame)
          }
        }
      } catch (e) {
        group.querySelector('.bubble-a').textContent = 'Error: ' + (e?.message || String(e))
      }

      container.scrollTop = container.scrollHeight
    }

    function appendMicError(msg) {
      const container = document.getElementById('messages')
      const el = document.createElement('div')
      el.className = 'bubble bubble-a'
      el.style.color = '#f87171'
      el.textContent = msg
      container.appendChild(el)
      container.scrollTop = container.scrollHeight
      setTimeout(() => el.remove(), 5000)
    }

    // ─── CONFIGURACIÓN ────────────────────────────────────────────────────────
    let recordingShortcut = false
    let pendingKeys       = []

    async function loadSettings() {
      const panel = document.getElementById('settings-content')
      panel.innerHTML = `
        <div class="setting-block">
          <h3>Atajo de voz <span style="font-size:10px;font-weight:600;background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);border-radius:4px;padding:2px 6px;letter-spacing:0.04em">BETA</span></h3>
          <p style="font-size:12px;color:var(--text2)">Combinación de teclas o botón del ratón para activar el micrófono. Evitá usar teclas que ya estén asignadas en tus juegos.</p>
          <div class="shortcut-row">
            <div id="shortcut-display">cargando...</div>
            <button class="btn-sm" id="btn-record-shortcut">Cambiar</button>
            <button class="btn-sm primary" id="btn-save-shortcut" style="display:none">Guardar</button>
            <button class="btn-sm" id="btn-cancel-shortcut" style="display:none">Cancelar</button>
          </div>
          <p id="shortcut-status" style="font-size:11px;color:#888"></p>
        </div>

        <div style="margin-top:auto;padding-top:8px;border-top:1px solid var(--border);text-align:center">
          <button style="background:none;border:none;font-size:11px;color:rgba(248,113,113,0.45);cursor:pointer;padding:4px 10px;border-radius:4px;transition:color 0.15s" onmouseover="this.style.color='#f87171'" onmouseout="this.style.color='rgba(248,113,113,0.45)'" onclick="window.api.invoke('quit-app')">Cerrar Iris</button>
        </div>
      `

      const current = await window.api.invoke('get-voice-shortcut')
      document.getElementById('shortcut-display').textContent = current

      document.getElementById('btn-record-shortcut').addEventListener('click', startRecordShortcut)
      document.getElementById('btn-save-shortcut').addEventListener('click', saveShortcut)
      document.getElementById('btn-cancel-shortcut').addEventListener('click', cancelRecordShortcut)

      refreshLogs()
    }


    function startRecordShortcut() {
      recordingShortcut = true
      pendingKeys = []
      const disp = document.getElementById('shortcut-display')
      disp.textContent = 'Presioná una tecla o botón del ratón...'
      disp.classList.add('recording')
      document.getElementById('btn-record-shortcut').style.display = 'none'
      document.getElementById('btn-save-shortcut').style.display = ''
      document.getElementById('btn-cancel-shortcut').style.display = ''
      document.addEventListener('keydown', captureShortcut)
      document.addEventListener('mousedown', captureMouseShortcut)
    }

    function captureShortcut(e) {
      e.preventDefault()
      e.stopPropagation()
      const parts = []
      if (e.ctrlKey)  parts.push('Ctrl')
      if (e.altKey)   parts.push('Alt')
      if (e.shiftKey) parts.push('Shift')
      const key = e.key
      if (!['Control','Alt','Shift','Meta'].includes(key)) {
        parts.push(key === ' ' ? 'Space' : key.length === 1 ? key.toUpperCase() : key)
      }
      pendingKeys = parts
      if (parts.length > 0) {
        document.getElementById('shortcut-display').textContent = parts.join('+')
      }
    }

    function captureMouseShortcut(e) {
      // Solo capturar botones laterales (4 y 5) — no left/right/middle
      if (e.button < 3) return
      e.preventDefault()
      e.stopPropagation()
      const btn = 'Mouse' + (e.button + 1)
      pendingKeys = [btn]
      const labels = { Mouse4: 'Botón lateral atrás (Mouse4)', Mouse5: 'Botón lateral adelante (Mouse5)' }
      document.getElementById('shortcut-display').textContent = labels[btn] || btn
    }

    async function saveShortcut() {
      const onlyModifiers = pendingKeys.every(k => ['Ctrl','Alt','Shift'].includes(k))
      if (pendingKeys.length === 0 || onlyModifiers) {
        document.getElementById('shortcut-status').textContent = 'Presioná al menos una tecla o botón del ratón.'
        return
      }
      document.removeEventListener('keydown', captureShortcut)
      document.removeEventListener('mousedown', captureMouseShortcut)
      recordingShortcut = false
      const shortcut = pendingKeys.join('+')
      const res = await window.api.invoke('set-voice-shortcut', { shortcut })
      const disp = document.getElementById('shortcut-display')
      disp.classList.remove('recording')
      document.getElementById('btn-record-shortcut').style.display = ''
      document.getElementById('btn-save-shortcut').style.display = 'none'
      document.getElementById('btn-cancel-shortcut').style.display = 'none'
      if (res?.ok) {
        disp.textContent = shortcut
        document.getElementById('shortcut-status').textContent = '✓ Guardado'
        setTimeout(() => { const s = document.getElementById('shortcut-status'); if(s) s.textContent = '' }, 3000)
      } else {
        document.getElementById('shortcut-status').textContent = 'Error: ' + (res?.error || 'no se pudo registrar')
      }
    }

    function cancelRecordShortcut() {
      document.removeEventListener('keydown', captureShortcut)
      document.removeEventListener('mousedown', captureMouseShortcut)
      recordingShortcut = false
      document.getElementById('shortcut-display').classList.remove('recording')
      document.getElementById('btn-record-shortcut').style.display = ''
      document.getElementById('btn-save-shortcut').style.display = 'none'
      document.getElementById('btn-cancel-shortcut').style.display = 'none'
      loadSettings()
    }

    const BORDERLESS_TIPS = {
      'league of legends': 'Para usar Iris con League of Legends, poné el juego en modo Sin bordes: ESC → Configuración → Video → Modo de pantalla → Sin bordes.',
      'valorant':          'Para usar Iris con Valorant, poné el juego en modo Sin bordes: Configuración → Video → Modo de pantalla → Sin bordes.',
      'cs2':               'Para usar Iris con CS2, activá Ventana sin bordes en Ajustes → Video → Modo de visualización.',
      'counter-strike':    'Para usar Iris con Counter-Strike, activá Ventana sin bordes en Ajustes → Video → Modo de visualización.',
      'fortnite':          'Para usar Iris con Fortnite, activá Ventana sin borde en Configuración → Video → Modo de ventana.',
      'apex legends':      'Para usar Iris con Apex, poné el juego en Sin bordes: Ajustes → Video → Modo de visualización.',
      'overwatch':         'Para usar Iris con Overwatch, activá Ventana sin bordes en Opciones → Video.',
      'warzone':           'Para usar Iris con Warzone, activá Ventana sin bordes en Opciones → Gráficos → Modo de pantalla.',
      'rainbow six':       'Para usar Iris con Rainbow Six, activá Sin bordes en Ajustes → Pantalla → Modo de pantalla.',
    }

    // ─── Snackbar reutilizable ────────────────────────────────────────────────
    let _snackbarOnCta = null

    function showSnackbar({ title, body, ctaLabel, onCta } = {}) {
      document.getElementById('snackbar-title').textContent = title || ''
      document.getElementById('snackbar-body').textContent  = body  || ''
      const ctaRow = document.getElementById('snackbar-cta-row')
      const ctaBtn = document.getElementById('snackbar-cta')
      if (ctaLabel && onCta) {
        ctaBtn.textContent = ctaLabel
        _snackbarOnCta = onCta
        ctaRow.style.display = 'block'
      } else {
        ctaRow.style.display = 'none'
        _snackbarOnCta = null
      }
      const el = document.getElementById('snackbar')
      el.style.display = 'block'
      el.style.animation = 'none'
      requestAnimationFrame(() => { el.style.animation = 'snack-in 0.2s ease' })
    }

    function snackbarClose() {
      document.getElementById('snackbar').style.display = 'none'
      _snackbarOnCta = null
    }

    document.getElementById('snackbar-cta').addEventListener('click', () => {
      if (_snackbarOnCta) _snackbarOnCta()
    })

    // ─── Tip de juego ─────────────────────────────────────────────────────────
    let _currentTipKey = null

    async function checkGameTip(gameName) {
      const gameLow = (gameName || '').toLowerCase()
      const tipKey  = Object.keys(BORDERLESS_TIPS).find(k => gameLow.includes(k))
      if (!tipKey) return
      _currentTipKey = tipKey
      const dismissed = await window.api.invoke('get-tip-dismissed', tipKey)
      if (dismissed) return
      showSnackbar({
        title:    'Configuración recomendada',
        body:     BORDERLESS_TIPS[tipKey],
        ctaLabel: 'No avisarme más',
        onCta:    async () => {
          await window.api.invoke('dismiss-tip', _currentTipKey)
          snackbarClose()
        }
      })
    }

    // ─── Feedback ─────────────────────────────────────────────────────────────

    function loadFeedback() {
      const panel = document.getElementById('feedback-content')
      panel.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:4px">
          <p style="font-size:13px;font-weight:600;color:var(--text)">Ayudanos a mejorar Iris</p>
          <p style="font-size:12px;color:var(--text2);line-height:1.5">Contanos qué no funciona, qué te gustaría ver, o cualquier cosa que quieras decirnos.</p>
        </div>
        <textarea id="feedback-textarea" placeholder="Escribí tu mensaje acá..." maxlength="1000"></textarea>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <span id="feedback-chars" style="font-size:11px;color:var(--text3)">0 / 1000</span>
          <button id="feedback-send" class="btn-sm primary" style="min-width:90px">Enviar</button>
        </div>
        <div id="feedback-status" style="font-size:12px;min-height:18px;text-align:center"></div>
        <div style="margin-top:auto;padding-top:12px;text-align:center;font-size:10px;color:var(--text3);letter-spacing:0.04em">
          <span id="app-version" style="display:block;font-size:11px;color:var(--text2);font-weight:600;margin-bottom:2px">Iris v—</span>
          © 2026 Iris by Cáceres
        </div>
      `

      window.api.invoke('get-app-version').then(v => {
        const el = document.getElementById('app-version')
        if (el) el.textContent = 'Iris v' + v
      }).catch(() => {})

      const textarea = document.getElementById('feedback-textarea')
      const chars    = document.getElementById('feedback-chars')
      const sendBtn  = document.getElementById('feedback-send')
      const status   = document.getElementById('feedback-status')

      textarea.addEventListener('input', () => {
        chars.textContent = `${textarea.value.length} / 1000`
      })

      sendBtn.addEventListener('click', async () => {
        const msg = textarea.value.trim()
        if (!msg) { status.style.color = '#f87171'; status.textContent = 'Escribí algo primero.'; return }

        sendBtn.disabled = true
        sendBtn.textContent = 'Enviando...'
        status.textContent = ''

        const gameLabel = document.getElementById('game-label')?.textContent?.replace('Juego: ', '') || null
        const game = gameLabel === '—' ? null : gameLabel

        try {
          const res = await window.api.invoke('send-feedback', { message: msg, game })
          if (res?.ok) {
            status.style.color = '#4ade80'
            status.textContent = '¡Gracias! Tu mensaje llegó.'
            textarea.value = ''
            chars.textContent = '0 / 1000'
          } else {
            status.style.color = '#f87171'
            status.textContent = 'Error al enviar. Intentá de nuevo.'
          }
        } catch (e) {
          status.style.color = '#f87171'
          status.textContent = 'Error: ' + e.message
        }

        sendBtn.disabled = false
        sendBtn.textContent = 'Enviar'
      })
    }

    window.addEventListener('load', () => {
      loadHeaderProfile()
      loadHistory()
    })
  </script>
</body>
</html>
