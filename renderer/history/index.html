<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          rgba(6,  6,  6,  0.88);
      --bg2:         rgba(4,  4,  4,  0.92);
      --bg3:         rgba(14, 14, 14, 0.80);
      --border:      rgba(40, 40, 40, 0.95);
      --accent:      #ffffff;
      --accent2:     #aaaaaa;
      --text:        #e8e8e8;
      --text2:       #666666;
      --text3:       #333333;
      --user-bubble: rgba(20, 20, 20, 0.90);
      --ai-bubble:   rgba(10, 10, 10, 0.85);
      --green:       #4ade80;
      --yellow:      #fbbf24;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      border: 1px solid rgba(40, 40, 40, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Header */
    #header {
      background: rgba(8, 8, 20, 0.6);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .header-icon {
      width: 14px;
      height: 14px;
      opacity: 0.55;
      flex-shrink: 0;
      fill: #fff;
    }

    #header h1 {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hdr-sep {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.10);
      margin: 0 2px;
      flex-shrink: 0;
    }

    /* Avatar en header */
    #hdr-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--text2);
    }

    #hdr-avatar img { width: 100%; height: 100%; object-fit: cover; }

    #hdr-username {
      font-size: 12px;
      color: var(--text2);
      max-width: 110px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 4px;
      -webkit-app-region: no-drag;
    }

    .hdr-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    .hdr-btn:hover { color: var(--text); background: var(--bg3); }
    .hdr-btn.danger:hover { color: #f38ba8; background: transparent; }
    .hdr-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* Tabs */
    #tabs {
      display: flex;
      background: rgba(8, 8, 20, 0.45);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: var(--accent2);
      border-bottom-color: var(--accent);
    }

    .tab:hover:not(.active) {
      color: var(--text2);
    }

    /* Memory info bar */
    #memory-bar {
      background: rgba(20, 20, 40, 0.5);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    .mem-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text2);
    }

    .mem-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text3);
      text-align: center;
      padding: 4px 0;
    }

    .bubble {
      padding: 10px 13px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 13px;
      max-width: 88%;
    }

    .bubble-q {
      background: rgba(22, 22, 22, 0.95);
      color: var(--text);
      align-self: flex-end;
      border-radius: 8px 8px 2px 8px;
      border: 1px solid #222;
    }

    .bubble-a {
      background: rgba(10, 10, 10, 0.90);
      color: var(--text);
      align-self: flex-start;
      border-radius: 2px 8px 8px 8px;
      border: 1px solid #1e1e1e;
      border-left: 2px solid #444;
    }

    .bubble-label {
      font-size: 10px;
      color: var(--text3);
      margin-bottom: 2px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .bubble-label.ai {
      color: var(--accent);
      opacity: 0.8;
    }

    .bubble-a ul {
      margin: 6px 0 2px 0;
      padding-left: 18px;
      list-style: disc;
    }

    .bubble-a li {
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .bubble-a strong { color: var(--accent); font-weight: 600; }
    .bubble-a em { color: var(--yellow); font-style: italic; }

    /* Chats tab */
    #chats-content {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #chats-content.active { display: flex; }

    /* Lista de chats */
    #chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #chats-list::-webkit-scrollbar { width: 4px; }
    #chats-list::-webkit-scrollbar-track { background: transparent; }
    #chats-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chat-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 13px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-item:hover { border-color: rgba(255,255,255,0.14); background: rgba(20,20,20,0.9); }
    .chat-item.active-chat { border-color: rgba(255,255,255,0.22); }

    .chat-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chat-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .chat-item-title-input {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: inherit;
      outline: none;
      flex: 1;
      min-width: 0;
    }

    .chat-item-date {
      font-size: 10px;
      color: var(--text3);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .chat-item-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .chat-action-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 3px 4px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
      opacity: 0;
    }

    .chat-item:hover .chat-action-btn { opacity: 1; }
    .chat-action-btn:hover { color: var(--text); }
    .chat-action-btn.del:hover { color: #f38ba8; }
    .chat-action-btn svg { width: 12px; height: 12px; fill: currentColor; }

    .chat-item-preview {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-meta {
      font-size: 10px;
      color: var(--text3);
      display: flex;
      gap: 8px;
    }

    /* Vista detalle de un chat */
    #chat-detail {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    #chat-detail.visible { display: flex; }

    #detail-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #back-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    #back-btn:hover { color: var(--text); }

    #detail-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #detail-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #detail-messages::-webkit-scrollbar { width: 4px; }
    #detail-messages::-webkit-scrollbar-track { background: transparent; }
    #detail-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chats-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 12px;
      gap: 6px;
    }

    .mem-clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 11px;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .mem-clear-btn:hover { color: #f38ba8; border-color: #f38ba8; }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text3);
      font-size: 12px;
    }

    .empty svg {
      width: 32px;
      height: 32px;
      fill: var(--text3);
      opacity: 0.4;
    }

    /* Footer */
    #footer {
      background: rgba(8, 8, 20, 0.65);
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    #footer-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 7px 14px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    #footer-input:focus { border-color: var(--accent); }
    #footer-input::placeholder { color: var(--text3); }


    #footer-send {
      background: rgba(255,255,255,0.08);
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      color: #ccc;
    }

    #footer-send:hover { background: rgba(255,255,255,0.14); }
    #footer-send svg { width: 13px; height: 13px; fill: currentColor; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="header-left">
        <svg class="header-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
        <h1>Iris</h1>
        <div class="hdr-sep"></div>
        <div id="hdr-avatar"></div>
        <span id="hdr-username"></span>
        <button class="hdr-btn danger" onclick="logout()" title="Cerrar sesión">
          <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zm-5 12H5V5h7V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h7v-2z"/></svg>
        </button>
      </div>
      <div id="header-right">
        <button class="hdr-btn" onclick="clearHistory()" title="Limpiar historial">
          <svg viewBox="0 0 24 24"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14zM6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12z"/></svg>
        </button>
        <button class="hdr-btn" onclick="window.api.send('close-history')" title="Cerrar">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>

    <div id="tabs">
      <div class="tab active" onclick="switchTab('chat')">Conversación</div>
      <div class="tab" onclick="switchTab('memory')">Chats</div>
    </div>

    <div id="memory-bar">
      <div class="mem-chip">
        <div class="mem-dot"></div>
        <span id="game-label">Juego: —</span>
      </div>
      <div class="mem-chip">
        <div class="mem-dot" style="background: #89b4fa"></div>
        <span id="session-label">Sesión activa</span>
      </div>
    </div>

    <div id="messages"></div>
    <div id="chats-content">
      <div id="chats-list"></div>
    </div>

    <div id="footer">
      <input id="footer-input" type="text" placeholder="Escribe aquí..." maxlength="500" />
<button id="footer-send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <script>
    let currentTab = 'chat'

    function switchTab(tab) {
      currentTab = tab
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'chat') || (i === 1 && tab === 'memory'))
      })
      document.getElementById('messages').style.display      = tab === 'chat' ? 'flex' : 'none'
      document.getElementById('chats-content').classList.toggle('active', tab === 'memory')
      document.getElementById('footer').style.display        = tab === 'chat' ? 'flex' : 'none'
      if (tab === 'memory') loadChats()
    }

    function formatTime(ts) {
      const d = new Date(ts)
      return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }) +
        ' ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
    }

    function formatDate(ts) {
      if (!ts) return ''
      const d = new Date(ts), now = new Date()
      const isToday = d.toDateString() === now.toDateString()
      if (isToday) return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
      return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' })
    }

    // ─── Chat conversación activa ─────────────────────────────────────────────

    async function loadHistory() {
      const history = await window.api.invoke('get-history')
      const container = document.getElementById('messages')

      if (!history || history.length === 0) {
        const session = await window.api.invoke('get-session')
        const firstName = session?.name ? session.name.split(' ')[0] : null
        const greeting = firstName ? `Hola ${firstName}!` : 'Hola!'
        container.innerHTML = `
          <div class="msg-group" id="welcome-msg">
            <div class="bubble-label ai">Iris</div>
            <div class="bubble bubble-a">${greeting} ¿Qué juego tenemos hoy?</div>
          </div>`
        return
      }

      container.innerHTML = ''
      history.forEach(item => {
        const group = document.createElement('div')
        group.className = 'msg-group'
        group.innerHTML = `
          <div class="msg-time">${formatTime(item.timestamp)}</div>
          <div class="bubble-label" style="text-align:right">Tú</div>
          <div class="bubble bubble-q">${escHtml(item.question)}</div>
          <div class="bubble-label ai">Iris</div>
          <div class="bubble bubble-a">${renderMarkdown(item.answer)}</div>
        `
        container.appendChild(group)
      })
      container.scrollTop = container.scrollHeight
    }

    async function loadHeaderProfile() {
      const session = await window.api.invoke('get-session')
      if (!session) return
      const avatarEl = document.getElementById('hdr-avatar')
      if (session.photoURL) {
        avatarEl.innerHTML = `<img src="${session.photoURL}" alt="" referrerpolicy="no-referrer">`
      } else {
        avatarEl.textContent = (session.name || session.email || '?')
          .split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase()
      }
      const firstName = (session.name || session.email || '').split(' ')[0]
      document.getElementById('hdr-username').textContent = firstName
    }

    // ─── Tab Chats ────────────────────────────────────────────────────────────

    async function loadChats() {
      const chats = await window.api.invoke('get-chats')
      const activeChat = await window.api.invoke('get-active-chat')
      const list = document.getElementById('chats-list')
      list.innerHTML = ''

      if (!chats || chats.length === 0) {
        list.innerHTML = `<div class="chats-empty"><span>Sin chats anteriores</span><span style="font-size:10px">Las conversaciones aparecerán aquí</span></div>`
        return
      }

      chats.forEach(chat => {
        const isActive = activeChat && chat.id === activeChat.id
        const item = document.createElement('div')
        item.className = 'chat-item' + (isActive ? ' active-chat' : '')
        item.dataset.chatId = chat.id

        const previewText = chat.preview || ''
        const preview = previewText
          ? escHtml(previewText.length > 60 ? previewText.slice(0, 60) + '…' : previewText)
          : (isActive ? 'Chat actual' : 'Sin mensajes')

        const count = chat.messageCount || 0
        const dateStr = formatDate(chat.updatedAt || chat.createdAt)

        item.innerHTML = `
          <div class="chat-item-top">
            <span class="chat-item-title" title="${escHtml(chat.title)}">${escHtml(chat.title)}</span>
            <div class="chat-item-actions">
              <button class="chat-action-btn" title="Renombrar" onclick="startRename(event, '${chat.id}')">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.46a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
              </button>
              <button class="chat-action-btn del" title="Eliminar" onclick="deleteChatItem(event, '${chat.id}')">
                <svg viewBox="0 0 24 24"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14zM6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12z"/></svg>
              </button>
            </div>
            <span class="chat-item-date">${dateStr}</span>
          </div>
          <div class="chat-item-preview">${preview}</div>
          <div class="chat-item-meta">
            <span>${count} ${count === 1 ? 'mensaje' : 'mensajes'}</span>
            ${chat.game ? `<span>· ${escHtml(chat.game)}</span>` : ''}
            ${isActive ? '<span>· activo</span>' : ''}
          </div>
        `

        item.addEventListener('click', e => {
          if (e.target.closest('.chat-action-btn')) return
          openChatDetail(chat)
        })
        list.appendChild(item)
      })
    }

    async function openChatDetail(chat) {
      const ok = await window.api.invoke('switch-chat', chat.id)
      if (!ok) return
      if (chat.game) {
        document.getElementById('game-label').textContent = `Juego: ${chat.game}`
      }
      switchTab('chat')
      await loadHistory()
    }

    function startRename(e, chatId) {
      e.stopPropagation()
      const item = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`)
      if (!item) return
      const titleEl = item.querySelector('.chat-item-title')
      const currentTitle = titleEl.textContent
      titleEl.outerHTML = `<input class="chat-item-title-input" value="${escHtml(currentTitle)}" data-rename-id="${chatId}">`
      const input = item.querySelector('.chat-item-title-input')
      input.focus()
      input.select()
      input.addEventListener('keydown', async e2 => {
        if (e2.key === 'Enter') await commitRename(input)
        if (e2.key === 'Escape') loadChats()
      })
      input.addEventListener('blur', () => commitRename(input))
    }

    async function commitRename(input) {
      const chatId = input.dataset.renameId
      const newTitle = input.value.trim()
      if (newTitle) await window.api.invoke('rename-chat', { chatId, newTitle })
      loadChats()
    }

    async function deleteChatItem(e, chatId) {
      e.stopPropagation()
      await window.api.invoke('delete-chat', { chatId })
      loadChats()
    }

    // ─── Enviar mensaje ───────────────────────────────────────────────────────

    function logout() {
      window.api.send('logout')
    }

    async function sendFromHistory() {
      const input = document.getElementById('footer-input')
      const text = input.value.trim()
      if (!text) return

      input.value = ''
      input.disabled = true

      const container = document.getElementById('messages')
      const group = document.createElement('div')
      group.className = 'msg-group'
      group.innerHTML = `
        <div class="msg-time">${formatTime(Date.now())}</div>
        <div class="bubble-label" style="text-align:right">Tú</div>
        <div class="bubble bubble-q">${escHtml(text)}</div>
        <div class="bubble-label ai">Iris</div>
        <div class="bubble bubble-a"><span class="spinner"></span>Pensando...</div>
      `
      container.appendChild(group)
      container.scrollTop = container.scrollHeight

      try {
        const result = await window.api.invoke('send-message', { message: text })
        const response = result?.response ?? result
        group.querySelector('.bubble-a').innerHTML = renderMarkdown(response)
        if (result?.currentGame) {
          document.getElementById('game-label').textContent = `Juego: ${result.currentGame}`
        }
      } catch (e) {
        group.querySelector('.bubble-a').textContent = 'Error al conectar. Intenta de nuevo.'
      }

      input.disabled = false
      input.focus()
      container.scrollTop = container.scrollHeight
    }

    async function clearHistory() {
      await window.api.invoke('clear-history')
      loadHistory()
    }

    // ─── Utils ────────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>')
    }

    function renderMarkdown(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>')
        .replace(/_([^_\n]+?)_/g, '<em>$1</em>')
        .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>(\n|<br>)*)+/gs, m => '<ul>' + m + '</ul>')
        .replace(/\n/g, '<br>')
    }

    document.getElementById('footer-send').addEventListener('click', sendFromHistory)
    document.getElementById('footer-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendFromHistory()
    })

    window.addEventListener('load', () => {
      loadHeaderProfile()
      loadHistory()
    })
  </script>
</body>
</html>
