<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; width: 160px; height: 86px; overflow: hidden; }

    .menu {
      background: rgba(13, 15, 20, 0.97);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.7);
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 11px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      cursor: pointer;
      border-radius: 5px;
      user-select: none;
      transition: background 0.1s;
    }
    .menu-item:hover { background: rgba(255,255,255,0.08); }
    .menu-item.danger { color: #f87171; }
    .menu-item.danger:hover { background: rgba(248,113,113,0.10); }

    .sep { height: 1px; background: rgba(255,255,255,0.07); margin: 3px 0; }
  </style>
</head>
<body>
  <div class="menu">
    <div class="menu-item" id="btn-open">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
      Abrir panel
    </div>
    <div class="sep"></div>
    <div class="menu-item danger" id="btn-quit">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16,17 21,12 16,7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Cerrar Iris
    </div>
  </div>

  <script>
    document.getElementById('btn-open').addEventListener('click', () => {
      window.api.send('context-open-panel')
    })
    document.getElementById('btn-quit').addEventListener('click', () => {
      window.api.invoke('quit-app')
    })
    window.addEventListener('blur', () => {
      window.api.send('context-close')
    })
  </script>
</body>
</html>
