<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'none'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 360px;
      height: 440px;
      background: transparent;
      font-family: 'Segoe UI', sans-serif;
    }

    #app {
      width: 360px;
      height: 440px;
      background: rgba(6,6,6,0.95);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
    }

    /* Drag bar */
    #drag-bar {
      height: 36px;
      background: rgba(10,10,10,0.6);
      border-bottom: 1px solid rgba(40,40,40,0.95);
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 7px;
      flex-shrink: 0;
    }

    #drag-bar svg {
      width: 12px;
      height: 12px;
      fill: #fff;
      opacity: 0.4;
    }

    #drag-bar span {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      -webkit-app-region: no-drag;
    }

    /* Content */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 40px;
      gap: 0;
    }

    .eye-icon {
      width: 48px;
      height: 48px;
      fill: #fff;
      opacity: 0.12;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 13px;
      font-weight: 500;
      color: #e8e8e8;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 11px;
      color: #444;
      margin-bottom: 36px;
      letter-spacing: 0.3px;
    }

    /* Google button */
    #google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      padding: 13px 20px;
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      letter-spacing: 0.2px;
    }

    #google-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
    }

    #google-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    #google-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #google-btn svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    #msg {
      margin-top: 14px;
      font-size: 11px;
      color: #f38ba8;
      text-align: center;
      min-height: 14px;
      line-height: 1.4;
    }

    #msg.success { color: #888; }

    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toggle "Recordarme" */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-top: 18px;
      cursor: pointer;
      user-select: none;
    }

    .remember-label {
      font-size: 12px;
      color: #555;
    }

    .toggle-wrap {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle-wrap input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #555;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-wrap input:checked + .toggle-track {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.30);
    }

    .toggle-wrap input:checked + .toggle-track::after {
      transform: translateX(16px);
      background: #ffffff;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 24px 0;
    }

    .footer-note {
      font-size: 10px;
      color: #333;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="drag-bar">
      <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
      <span>Iris</span>
    </div>
    <div id="content">
      <svg class="eye-icon" viewBox="0 0 24 24">
        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/>
      </svg>

      <h1>Iris</h1>
      <p class="subtitle">Tu asistente IA para jugar mejor</p>

      <button id="google-btn" onclick="loginWithGoogle()">
        <!-- Google logo SVG -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <label class="remember-row" for="remember-toggle">
        <span class="remember-label">Recordarme</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="remember-toggle" checked>
          <div class="toggle-track"></div>
        </div>
      </label>

      <div id="msg"></div>

      <div class="divider"></div>
      <p class="footer-note">
        Se abrirá tu navegador para iniciar sesión.<br>
        Solo necesitás una cuenta de Google.
      </p>
    </div>
  </div>

  <script>
    let loading = false

    function setMsg(text, isError = true) {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = isError ? '' : 'success'
    }

    function setLoading(val) {
      loading = val
      const btn = document.getElementById('google-btn')
      btn.disabled = val
      btn.innerHTML = val
        ? '<span class="spinner"></span> Esperando en el navegador...'
        : `<svg viewBox="0 0 24 24" width="17" height="17">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
           </svg>
           Continuar con Google`
    }

    async function loginWithGoogle() {
      if (loading) return
      setLoading(true)
      setMsg('')

      const remember = document.getElementById('remember-toggle').checked

      try {
        const result = await window.api.invoke('google-login', { remember })
        if (result.error) {
          setMsg(result.error)
          setLoading(false)
        } else {
          setMsg('¡Bienvenido, ' + (result.user.name || result.user.email) + '!', false)
          setTimeout(() => window.api.send('login-success', result.user), 900)
        }
      } catch (e) {
        setMsg('Error: ' + (e && e.message ? e.message : String(e)))
        setLoading(false)
      }
    }
  </script>
</body>
</html>
